services:
  backend:
    build: .
    command: uvicorn miles_app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      APP_ENV: local
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: miles_app
      POSTGRES_USER: miles_app
      POSTGRES_PASSWORD: miles_app_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

